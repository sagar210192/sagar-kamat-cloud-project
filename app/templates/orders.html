<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Order History</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        .order {
            border-bottom: 1px solid #ddd;
            padding: 15px 0;
        }

        .total {
            font-weight: bold;
            color: green;
        }

        a {
            display: inline-block;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Order History</h1>

        <a href="/products">Back to Products</a>

        {% if orders %}
            {% for order in orders %}
                <div class="order">
                    <h2>Order #{{ order.id }}</h2>

                    <p>
                        Status: {{ order.status }}
                    </p>

                    <p class="total">
                        Total: ${{ "%.2f"|format(order.total) }}
                    </p>

                    <p>
                        Date: {{ order.created_at }}
                    </p>
                </div>
            {% endfor %}
        {% else %}
            <p>No orders have been placed yet.</p>
        {% endif %}
    </div>
</body>
</html>
